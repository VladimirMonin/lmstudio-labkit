- task_id: l328d1_repair_blocks_ru_ru
  family: structured_json
  modality: text
  language: ru_ru
  structure_complexity: medium
  response_schema_complexity: blocks
  volume: single
  task_intent: id_preservation
  input_profile: repair_blocks_ru_ru
  output_language_policy: preserve_input_language
  prompt_variant: structured_json_repair_exact_blocks
  validation_policy: auto_schema_business
  prompt: 'Return JSON only. Do not use markdown. Do not add explanations.

    Return exactly this JSON shape:

    {"blocks":[{"id":0,"text":"первый блок"},{"id":1,"text":"второй блок"},{"id":2,"text":"третий
    блок"}]}

    Rules:

    - Return exactly the same number of blocks.

    - Preserve every id exactly.

    - Preserve order exactly.

    - Do not merge, split, delete, duplicate, or reorder blocks.

    - Return only field: blocks.'
  schema_family: blocks
  schema_variant: hardened_const
  expected_ids:
  - 0
  - 1
  - 2
  id_paths:
  - blocks[*].id
  expected_output:
    blocks:
    - id: 0
      text: первый блок
    - id: 1
      text: второй блок
    - id: 2
      text: третий блок
  fake_mode: valid
  manual_review_policy: sanitized_metrics_only
  language_include_paths:
  - blocks[*].text
