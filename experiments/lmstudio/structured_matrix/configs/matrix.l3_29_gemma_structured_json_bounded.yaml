tasks:
- task_id: l328d1_repair_simple_ru_ru
  family: structured_json
  modality: text
  language: ru_ru
  structure_complexity: simple
  response_schema_complexity: simple
  volume: single
  task_intent: schema_only
  input_profile: repair_schema_simple_ru_ru
  output_language_policy: preserve_input_language
  prompt_variant: structured_json_repair_exact_shape
  validation_policy: auto_schema_business
  prompt: 'Return JSON only. Do not use markdown. Do not add explanations.

    Return exactly this JSON shape:

    {"language":"ru_ru","items":["первый","второй"]}

    Rules:

    - Use the language value exactly: ru_ru.

    - Use exactly the two provided items.

    - Return only fields: language, items.'
  schema_family: simple
  schema:
    type: object
    required:
    - language
    - items
    additionalProperties: false
    properties:
      language:
        type: string
      items:
        type: array
        items:
          type: string
        minItems: 2
  expected_output:
    language: ru_ru
    items:
    - первый
    - второй
  fake_mode: valid
  manual_review_policy: sanitized_metrics_only
  language_include_paths:
  - items[*]
