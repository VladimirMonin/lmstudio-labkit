- task_id: l328d1_repair_blocks_ru_en_mixed
  family: structured_json
  modality: text
  language: ru_en_mixed
  structure_complexity: medium
  response_schema_complexity: blocks
  volume: single
  task_intent: id_preservation
  input_profile: repair_blocks_ru_en_mixed
  output_language_policy: preserve_input_language
  prompt_variant: structured_json_repair_exact_blocks
  validation_policy: auto_schema_business
  prompt: 'Return JSON only. Do not use markdown. Do not add explanations.

    Return exactly this JSON shape:

    {"blocks":[{"id":0,"text":"Проверяем Django модель"},{"id":1,"text":"Валидируем
    JSON schema"},{"id":2,"text":"Сохраняем Qwen термин"}]}

    Rules:

    - Return exactly the same number of blocks.

    - Preserve every id exactly.

    - Preserve order exactly.

    - Preserve the Russian and English technical terms exactly.

    - Do not merge, split, delete, duplicate, or reorder blocks.

    - Return only field: blocks.'
  schema_family: blocks
  schema_variant: hardened_const
  expected_ids:
  - 0
  - 1
  - 2
  id_paths:
  - blocks[*].id
  expected_output:
    blocks:
    - id: 0
      text: Проверяем Django модель
    - id: 1
      text: Валидируем JSON schema
    - id: 2
      text: Сохраняем Qwen термин
  fake_mode: valid
  manual_review_policy: sanitized_metrics_only
  language_include_paths:
  - blocks[*].text
- task_id: l332_complex_ru_en_mixed
  family: structured_json
  modality: text
  language: ru_en_mixed
  structure_complexity: complex
  response_schema_complexity: complex
  volume: single
  task_intent: semantic_extraction
  structured_task_complexity: semantic_extraction
  input_profile: complex_ru_en_mixed
  output_language_policy: preserve_input_language
  prompt_variant: structured_json_complex_exact_shape
  validation_policy: auto_schema_business
  prompt: 'Return JSON only. Return exactly this nested object with language ru_en_mixed,
    one section, one paragraph element, extracted_data arrays, and warnings array.
    Do not add fields. Text: Django модель сохраняет id, JSON schema и Qwen термин
    без перевода.'
  schema_family: complex
  schema:
    type: object
    required:
    - document
    - extracted_data
    - warnings
    additionalProperties: false
    properties:
      document:
        type: object
        required:
        - language
        - sections
        additionalProperties: false
        properties:
          language:
            type: string
          sections:
            type: array
            minItems: 1
            items:
              type: object
              required:
              - id
              - title
              - elements
              additionalProperties: false
              properties:
                id:
                  type: integer
                title:
                  type: string
                elements:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - id
                    - type
                    - text
                    - confidence_hint
                    additionalProperties: false
                    properties:
                      id:
                        type: integer
                      type:
                        type: string
                      text:
                        type: string
                      confidence_hint:
                        type: string
      extracted_data:
        type: object
        required:
        - tables
        - charts
        - ui_controls
        - code_entities
        additionalProperties: false
        properties:
          tables:
            type: array
            items: {}
          charts:
            type: array
            items: {}
          ui_controls:
            type: array
            items: {}
          code_entities:
            type: array
            items: {}
      warnings:
        type: array
        items:
          type: string
  expected_output:
    document:
      language: ru_en_mixed
      sections:
      - id: 0
        title: Проверка JSON schema
        elements:
        - id: 0
          type: paragraph
          text: Django модель сохраняет id, JSON schema и Qwen термин без перевода.
          confidence_hint: high
    extracted_data:
      tables: []
      charts: []
      ui_controls: []
      code_entities: []
    warnings: []
  fake_mode: valid
  manual_review_policy: sanitized_metrics_only
  language_include_paths:
  - document.sections[*].title
  - document.sections[*].elements[*].text
