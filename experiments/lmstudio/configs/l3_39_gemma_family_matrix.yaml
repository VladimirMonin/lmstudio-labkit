    caps:
      "off": {simple: 1024, blocks: 2048, complex: 4096}
      "on": {simple: 4096, blocks: 6144, complex: 8192}
      reasoning_omitted_unknown: {simple: 4096, blocks: 6144, complex: 8192}
  vision:
    fixture_id: ui_settings_ru_001
    fixture_path: experiments/lmstudio/structured_matrix/datasets/image/gemma_vision/fixtures/ui_settings_ru_001.png
    expected_path: experiments/lmstudio/structured_matrix/datasets/image/gemma_vision/expected/ui_settings_ru_001.expected.yaml
