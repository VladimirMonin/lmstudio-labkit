    stages: [perception, simple, medium, complex]
    caps:
      "off": {perception: 2048, simple: 1024, medium: 2048, complex: 4096}
      "on": {perception: 6144, simple: 4096, medium: 6144, complex: 8192}
      reasoning_omitted_unknown: {perception: 6144, simple: 4096, medium: 6144, complex: 8192}
  one_shot_context:
    tiers:
      - {name: 4k, nominal_input_tokens: 4096, context_length: 8192}
      - {name: 12k, nominal_input_tokens: 12288, context_length: 16384}
      - {name: 28k, nominal_input_tokens: 28672, context_length: 32768}
    max_output_tokens: 1024
    framing_reserve_tokens: 512
  session:
    context_length: 16384
    stable_message_1_nominal_tokens: 10240
    changing_message_2_chunks: [chunk_1, chunk_2, chunk_3]
    modes: [cold_full_prefix, loaded_stable_message_1]
    max_output_tokens: 1024
    store: false
    previous_response_id: null
    accumulating_history: false
row_budget:
  text_structure: 27
  vision_perception: 9
  vision_structured: 27
  one_shot_context: 15
  session_cold: 15
  session_loaded: 15
  maximum_live_calls: 108
  offline_replay_records: 6
  total_matrix_records: 114
stop_gates:
  global:
    - exact model or variant substitution
    - starting global loaded count is not zero
    - private capture unavailable
    - more than one loaded instance
    - applied context or parallelism mismatch
    - HTTP or runtime failure
    - cleanup not verified
    - ending global loaded count is not zero
  lane:
    - unsupported reasoning or vision metadata creates zero calls
    - simple syntax or schema failure without cap evidence blocks higher complexity
    - failed perception or grounding blocks structured vision expansion
    - failed lower context blocks higher context
    - session requires accepted 16k load and valid simple text contract
non_claims:
  - no physical KV reuse claim
  - no cache benefit claim
  - no remote memory attribution
  - no quality claim without private-answer review
  - no strict-route reasoning comparison
